<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Provision New Asset | Vault</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0f0f12; color: #e0e0e0; min-height: 100vh; }
        .form-card {
            background: #1a1a20;
            border: 1px solid #333;
            border-radius: 15px;
            padding: 2.5rem;
        }
        .form-label { color: #888; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; }
        .form-control {
            background: #0f0f12;
            border: 1px solid #444;
            color: #fff;
            border-radius: 8px;
            padding: 0.8rem;
        }
        .form-control:focus {
            background: #0f0f12;
            border-color: #00ff41;
            color: #fff;
            box-shadow: 0 0 0 0.25rem rgba(0, 255, 65, 0.1);
        }
        .btn-provision {
            background: #00ff41;
            color: #000;
            border: none;
            font-weight: bold;
            text-transform: uppercase;
        }
        .btn-provision:hover { background: #00cc33; color: #fff; }
    </style>
</head>
<body class="d-flex align-items-center">

    <div class="container" style="max-width: 450px;">
        <div class="form-card shadow-lg">
            <h2 class="text-white mb-4 fw-bold text-center">Provision New Asset</h2>
            
            <form method="post">
                {% csrf_token %}
                
                {% for field in form %}
                    <div class="mb-4">
                        <label class="form-label">{{ field.label }}</label>
                        {{ field }}
                        {% for error in field.errors %}
                            <div class="text-danger small mt-1">{{ error }}</div>
                        {% endfor %}
                    </div>
                {% endfor %}
                
                <button type="submit" class="btn btn-provision w-100 py-3 mb-2">Initialize Storage</button>
                <a href="{% url 'vault:password_list' %}" class="btn btn-outline-secondary w-100 border-0 text-secondary">Abort</a>
            </form>
        </div>
    </div>

</body>
</html>
