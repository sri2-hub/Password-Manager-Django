<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Protocol Directory | Vault</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #0f0f12;
            color: #d1d1d1;
            min-height: 100vh;
        }
        .dashboard-header {
            border-bottom: 1px solid #333;
            padding-bottom: 1.5rem;
            margin-bottom: 2rem;
        }
        .list-group-item {
            background: #1a1a20;
            border: 1px solid #333;
            color: #fff;
            margin-bottom: 0.5rem;
            border-radius: 10px !important;
            transition: 0.3s;
        }
        .list-group-item:hover {
            background: #25252d;
            border-color: #555;
        }
        .btn-reveal {
            background: transparent;
            color: #00ff41;
            border: 1px solid #00ff41;
            font-size: 0.8rem;
            text-transform: uppercase;
        }
        .btn-reveal:hover {
            background: #00ff41;
            color: #000;
        }
        .btn-action { border-radius: 50px; padding: 0.5rem 1.5rem; }
    </style>
</head>
<body class="container py-5">

    <div class="dashboard-header d-flex justify-content-between align-items-center">
        <div>
            <h2 class="text-white">Active Credential Index</h2>
            <p class="text-secondary mb-0">Manage and audit your encrypted assets.</p>
        </div>
        <div>
            <a href="{% url 'vault:add_password' %}" class="btn btn-outline-light btn-action">+ Add Entry</a>
            <a href="{% url 'vault:logout' %}" class="btn btn-outline-danger btn-action ms-2">Terminate Session</a>
        </div>
    </div>
    
    <ul class="list-group">
        {% for entry in passwords %}
            <li class="list-group-item d-flex justify-content-between align-items-center">
                <div>
                    <strong class="text-white">{{ entry.service_name }}</strong>
                    <br>
                    <small class="text-secondary">{{ entry.username }}</small>
                </div>
                <a href="{% url 'vault:reveal_password' entry_id=entry.id %}" class="btn btn-reveal">
                    Access Secret
                </a>
            </li>
        {% empty %}
            <li class="list-group-item text-center py-4 bg-transparent border-dashed">
                <span class="text-secondary">No active credentials stored in this node.</span>
            </li>
        {% endfor %}
    </ul>

</body>
</html>
