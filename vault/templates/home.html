<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ephemeral Security Protocol | Vault</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: white;
            display: flex;
            align-items: center;
        }
        .hero-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border-radius: 24px;
            padding: 4rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        .hero-card h1 {
            letter-spacing: -1px;
            text-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .btn-custom {
            padding: 0.8rem 2.5rem;
            font-weight: 600;
            border-radius: 50px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .btn-custom:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>

    <div class="container text-center">
        <div class="hero-card">
            <h1 class="display-3 fw-bold mb-4">Ephemeral Security Protocol</h1>
            <p class="lead mb-5 text-white-50">
                An isolated environment for credential lifecycle management.<br>
                Decryption occurring exclusively in-memory.
            </p>
            
            <div class="d-grid gap-3 d-sm-flex justify-content-center">
                <a href="{% url 'vault:login' %}" class="btn btn-outline-light btn-custom px-5">
                    Initiate Secure Session
                </a>
            </div>
        </div>
    </div>

</body>
</html>
